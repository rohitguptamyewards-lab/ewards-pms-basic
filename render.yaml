services:
  - type: web
    name: ewards-pms-basic
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: "eWards PMS"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: NEON_ENDPOINT_ID
        sync: false
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: LOG_CHANNEL
        value: stderr
      - key: PORT
        value: "10000"
      - key: MAIL_MAILER
        value: brevo
      - key: MAIL_FROM_ADDRESS
        value: "project.tool.ewards@gmail.com"
      - key: MAIL_FROM_NAME
        value: "eWards PMS"
      - key: BREVO_API_KEY
        sync: false
